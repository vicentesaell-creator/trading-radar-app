name: Escáner Diario de Mercado Real

on:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * 1-5'

# 🔐 Permisos necesarios para que el robot pueda escribir datos en tu repositorio
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Copiando el repositorio
      uses: actions/checkout@v3

    - name: Configurando Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalando Librerías Financieras
      run: |
        python -m pip install --upgrade pip
        pip install yfinance

    - name: Ejecutando Escáner Inteligente
      run: python app.py

    - name: Guardando Datos Reales en el Radar
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add datos_radar.json
        git commit -m "📡 Actualización automática del Radar con datos en vivo" || exit 0
        git push
